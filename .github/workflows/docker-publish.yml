name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '35 23 * * *'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: mafumaful/ubuntu2204


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: 'v2.2.4'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UBUNTU_APT_MIRROR=http://archive.ubuntu.com/ubuntu
            ROS_APT_MIRROR=http://packages.ros.org/ros2/ubuntu
            PYPI_MIRROR=https://pypi.org/simple
            HF_ENDPOINT=https://huggingface.co
            OH_MY_ZSH_REPO=https://github.com/ohmyzsh/ohmyzsh.git
            ZSH_AUTOSUGGESTIONS_REPO=https://github.com/zsh-users/zsh-autosuggestions.git
            ZSH_SYNTAX_HIGHLIGHTING_REPO=https://github.com/zsh-users/zsh-syntax-highlighting.git
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Notify Feishu
        if: ${{ github.event_name != 'pull_request' }}
        env:
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          PACKAGE_URL: https://ghcr.io/${{ env.IMAGE_NAME }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.request

          webhook = os.environ.get("FEISHU_BOT_WEBHOOK", "").strip()
          if not webhook:
              print("FEISHU_BOT_WEBHOOK is not set; skipping Feishu notification.")
              sys.exit(0)

          tags = [line.strip() for line in os.environ.get("TAGS", "").splitlines() if line.strip()]
          digest = os.environ.get("DIGEST", "").strip()
          image = os.environ.get("IMAGE", "").strip()
          package_url = os.environ.get("PACKAGE_URL", "").strip()
          pull_target = tags[0] if tags else image
          digest_target = f"{image}@{digest}" if image and digest else ""
          repository = os.environ.get("GITHUB_REPOSITORY", "")
          server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          sha = os.environ.get("GITHUB_SHA", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          before_sha = os.environ.get("BEFORE_SHA", "")
          short_sha = sha[:12] if sha else ""
          run_url = f"{server_url}/{repository}/actions/runs/{run_id}" if repository and run_id else ""
          commit_url = f"{server_url}/{repository}/commit/{sha}" if repository and sha else ""
          compare_url = ""
          if repository and before_sha and sha and set(before_sha) != {"0"}:
              compare_url = f"{server_url}/{repository}/compare/{before_sha}...{sha}"

          change_range = sha
          if before_sha and sha and set(before_sha) != {"0"}:
              change_range = f"{before_sha}..{sha}"
          try:
              changes_output = subprocess.check_output(
                  ["git", "log", "--no-merges", "--pretty=format:%h %s", change_range],
                  text=True,
                  stderr=subprocess.DEVNULL,
              ).strip()
          except Exception:
              changes_output = ""
          changes = [line for line in changes_output.splitlines() if line][:10]
          if not changes and short_sha:
              changes = [f"{short_sha} {os.environ.get('GITHUB_EVENT_NAME', '')} build"]

          def link(label, url):
              return f"[{label}]({url})" if url else label

          change_lines = "\n".join(f"- `{change}`" for change in changes[:8]) if changes else "- 无可用提交摘要"
          tag_lines = "\n".join(f"- `{tag}`" for tag in tags[:8]) if tags else "- 无 tag 信息"
          digest_short = digest[:24] + "..." if len(digest) > 27 else digest

          markdown = "\n".join([
              "**Docker 镜像发布成功**",
              "",
              f"**仓库**：{repository}",
              f"**版本**：`{ref_name}` / `{short_sha}`",
              f"**提交**：{link(short_sha or 'commit', commit_url)}",
              f"**流水线**：{link('查看 GitHub Action', run_url)}",
              f"**镜像包**：{link(image, package_url)}",
              "",
              "**拉取命令**",
              f"```bash\ndocker pull {pull_target}\n```",
              "",
              "**Digest 拉取**",
              f"```bash\ndocker pull {digest_target}\n```" if digest_target else "暂无 digest 信息",
              f"**Digest**：`{digest_short}`" if digest_short else "",
              "",
              "**本次改动**",
              change_lines,
              f"\n{link('查看完整 diff', compare_url)}" if compare_url else "",
              "",
              "**发布标签**",
              tag_lines,
              "",
              "_关键词：Docker image published_",
          ])

          payload = {
              "msg_type": "interactive",
              "card": {
                  "config": {
                      "wide_screen_mode": True,
                  },
                  "header": {
                      "template": "green",
                      "title": {
                          "tag": "plain_text",
                          "content": "Docker 镜像发布成功",
                      },
                  },
                  "elements": [
                      {
                          "tag": "markdown",
                          "content": markdown,
                      },
                  ],
              },
          }
          data = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              webhook,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              body = response.read().decode("utf-8", errors="replace")
              print(f"Feishu webhook response: {response.status} {body}")
          PY
