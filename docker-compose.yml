services:
  ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        USER_NAME: ${USER_NAME:-ros}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        ROS_DISTRO: humble
        UBUNTU_APT_MIRROR: ${UBUNTU_APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/ubuntu}
        ROS_APT_MIRROR: ${ROS_APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/ros2/ubuntu}
        PYPI_MIRROR: ${PYPI_MIRROR:-https://pypi.tuna.tsinghua.edu.cn/simple}
        UV_PYTHON_INSTALL_MIRROR: ${UV_PYTHON_INSTALL_MIRROR:-}
        HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
        GIT_URL_REWRITE_FROM: ${GIT_URL_REWRITE_FROM:-https://github.com/}
        GIT_URL_REWRITE_TO: ${GIT_URL_REWRITE_TO:-}
        OPENPI_REPO: ${OPENPI_REPO:-https://github.com/Physical-Intelligence/openpi.git}
        OPENPI_REF: ${OPENPI_REF:-main}
        OH_MY_ZSH_REPO: ${OH_MY_ZSH_REPO:-https://gitee.com/mirrors/oh-my-zsh.git}
        ZSH_AUTOSUGGESTIONS_REPO: ${ZSH_AUTOSUGGESTIONS_REPO:-https://gitee.com/mirrors/zsh-autosuggestions.git}
        ZSH_SYNTAX_HIGHLIGHTING_REPO: ${ZSH_SYNTAX_HIGHLIGHTING_REPO:-https://gitee.com/mirrors/zsh-syntax-highlighting.git}
    image: ghcr.io/mafumaful/ubuntu2204:pi0-ros2
    container_name: ros2-pi0-dev
    hostname: ros2-pi0-dev
    stdin_open: true
    tty: true
    network_mode: host
    gpus: all
    shm_size: 8gb
    ipc: host
    environment:
      USER_NAME: ${USER_NAME:-ros}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      TZ: ${TZ:-Asia/Shanghai}
      DATA_DIR: /data
      PROXY_HOST: host.docker.internal
      PROXY_PORT: "17891"
      PIP_INDEX_URL: ${PYPI_MIRROR:-https://pypi.tuna.tsinghua.edu.cn/simple}
      UV_DEFAULT_INDEX: ${PYPI_MIRROR:-https://pypi.tuna.tsinghua.edu.cn/simple}
      UV_INDEX_URL: ${PYPI_MIRROR:-https://pypi.tuna.tsinghua.edu.cn/simple}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      OPENPI_HOME: /openpi
      OPENPI_DATA_HOME: /home/${USER_NAME:-ros}/.cache/openpi
      OPENPI_POLICY_CONFIG: ${OPENPI_POLICY_CONFIG:-pi05_droid}
      OPENPI_SOURCE_CHECKPOINT: ${OPENPI_SOURCE_CHECKPOINT:-gs://openpi-assets/checkpoints/pi05_droid}
      OPENPI_CHECKPOINT: ${OPENPI_CHECKPOINT:-/home/${USER_NAME:-ros}/.cache/openpi/pytorch-checkpoints/pi05_droid}
      OPENPI_AUTO_CONVERT_PYTORCH: ${OPENPI_AUTO_CONVERT_PYTORCH:-1}
      OPENPI_POLICY_PORT: ${OPENPI_POLICY_PORT:-8000}
      PI0_POLICY_HOST: ${PI0_POLICY_HOST:-127.0.0.1}
      PI0_POLICY_PORT: ${OPENPI_POLICY_PORT:-8000}
      BUILD_WS_ON_START: ${BUILD_WS_ON_START:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./workspace:/home/${USER_NAME:-ros}/ws
      - ./data:/data
      - ./config:/config
      - ./data/openpi-cache:/home/${USER_NAME:-ros}/.cache/openpi
    working_dir: /home/${USER_NAME:-ros}/ws
    command: pi0-shell
